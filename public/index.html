<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>加载中...</title>
  <link rel="stylesheet" href="/themes.css" />
</head>
<body class="theme-neon">
  <nav class="navbar">
    <div class="nav-inner">
      <div class="logo" id="nav-logo">MegaReleases</div>
      <div class="nav-menu">
        <a href="#products">产品</a>
        <a href="#featured">精选</a>
        <a href="#" id="nav-contact" class="hide-mobile">联系我们</a>
        <a href="/admin" class="btn btn-outline" style="padding:8px 16px;font-size:13px;">后台</a>
      </div>
    </div>
  </nav>

  <section class="hero" id="home">
    <div class="slogan" id="hero-slogan">发现全球顶级的软件和产品</div>
    <h1 id="hero-title">MegaReleases</h1>
    <p class="desc" id="hero-desc">我们精心挑选每一款产品，只为给你最好的体验。</p>
    <div class="actions">
      <a href="#products" class="btn">浏览全部产品</a>
      <a href="#featured" class="btn btn-outline">查看精选</a>
    </div>
  </section>

  <section class="section" id="featured">
    <h2 class="section-title">精选推荐</h2>
    <p class="section-sub">团队严选 · 本月最值得关注的产品</p>
    <div class="products-grid" id="featured-grid"></div>
  </section>

  <section class="section" id="products" style="padding-top: 0;">
    <h2 class="section-title">全部产品</h2>
    <p class="section-sub">涵盖各个领域 · 持续更新中</p>
    <div class="products-grid" id="products-grid"></div>
  </section>

  <footer class="footer">
    <div id="footer-text">© 2026 MegaReleases</div>
  </footer>

  <script src="/main.js"></script>
</body>
</html>
